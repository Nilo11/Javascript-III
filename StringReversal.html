<!DOCTYPE html>
<html>
<body>

    <h2>String Reversal (Spaces to Dashes)</h2>
    <input type="text" id="userInput" placeholder="Type something..." oninput="processString()">
    <p><strong>Result:</strong> <span id="output"></span></p>

    <script>
        function processString() {
            let str = document.getElementById("userInput").value;
            let result = "";

            // Loop backwards starting from the last character
            for (let i = str.length - 1; i >= 0; i--) {
                if (str[i] === " ") {
                    result += "-"; // Replace space with dash
                } else {
                    result += str[i]; // Append character
                }
            }

            document.getElementById("output").innerText = result;
        }
    </script>

</body>
</html>
